# Database
spring.datasource.url=jdbc:postgresql://ep-holy-waterfall-a57rok3e.us-east-2.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=UqQ0Yrws2huj
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML

# Debugging
logging.level.org.springframework.web=DEBUG
logging.level.org.thymeleaf=TRACE
logging.level.org.hibernate=ERROR
logging.level.com.universidad.gestion_estudiante=DEBUG
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always
spring.jpa.properties.hibernate.format_sql=true

# Aumentar el tamaño máximo permitido para solicitudes multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Configurar tiempo de espera
server.connection-timeout=120s