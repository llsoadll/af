<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Login - Anatomía Funcional</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card" data-aos="fade-up">
                        <div class="card-header">
                            <h3 class="text-center"><i class="fas fa-user"></i> Iniciar Sesión</h3>
                            <div th:if="${registroExitoso}">
                                <p>¡Registro exitoso! Ahora puedes iniciar sesión.</p>
                            </div>
                            <form th:action="@{/login}" method="post"></form>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/login}" method="post">
                                <div class="mb-3">
                                    <label for="username">Usuario:</label>
                                    <input type="text" class="form-control" id="username" name="username" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password">Contraseña:</label>
                                    <input type="password" class="form-control" id="password" name="password" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-sign-in-alt"></i> Ingresar
                                </button>
                            </form>
                            <a th:href="@{/usuarios/registro}">Regístrate aquí</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
